<aside class="admin-page-nav" aria-label="Administration">
  {% set admin_org_id = request.query_params.get("org_id") %}
  {% set admin_org_q = "?org_id=" ~ admin_org_id if admin_org_id else "" %}
  <div class="admin-page-nav-title">
    <span>Administration</span>
    <button type="button" class="admin-nav-toggle" aria-label="Collapse Administration navigation" aria-expanded="true" title="Collapse navigation">‹</button>
  </div>
  <nav class="admin-page-nav-list">
    <a href="/imports/govwin{{ admin_org_q }}" class="{{ 'active' if admin_nav_active == 'sources' else '' }}" title="Sources">
      <span class="admin-settings-nav-icon" aria-hidden="true">↓</span>
      <span class="admin-nav-label">Sources</span>
    </a>
    <a href="/imports/history{{ admin_org_q }}" class="{{ 'active' if admin_nav_active == 'history' else '' }}" title="Pull History">
      <span class="admin-settings-nav-icon" aria-hidden="true">◷</span>
      <span class="admin-nav-label">Pull History</span>
    </a>
    <a href="/admin/source-updates{{ admin_org_q }}" class="{{ 'active' if admin_nav_active == 'source_updates' else '' }}" title="Source Update Log">
      <span class="admin-settings-nav-icon" aria-hidden="true">↻</span>
      <span class="admin-nav-label">Source Update Log</span>
    </a>
    <a href="/admin/market-activity{{ admin_org_q }}" class="{{ 'active' if admin_nav_active == 'market_activity' else '' }}" title="Market Activity">
      <span class="admin-settings-nav-icon" aria-hidden="true">⌁</span>
      <span class="admin-nav-label">Market Activity</span>
    </a>
    <a href="/settings{{ admin_org_q }}" class="{{ 'active' if admin_nav_active == 'feed_rules' else '' }}" title="Feed Rules">
      <span class="admin-settings-nav-icon" aria-hidden="true">▦</span>
      <span class="admin-nav-label">Feed Rules</span>
    </a>
    <a href="/pursuit-lanes{{ admin_org_q }}" class="{{ 'active' if admin_nav_active == 'lanes' else '' }}" title="Pursuit Lanes">
      <span class="admin-settings-nav-icon" aria-hidden="true">◇</span>
      <span class="admin-nav-label">Pursuit Lanes</span>
    </a>
    <a href="/integrations{{ admin_org_q }}" class="{{ 'active' if admin_nav_active == 'integrations' else '' }}" title="Integrations">
      <span class="admin-settings-nav-icon" aria-hidden="true">☁</span>
      <span class="admin-nav-label">Integrations</span>
    </a>
  </nav>
  <div class="admin-page-help">
    <div class="admin-page-help-title">Need help?</div>
    <a href="#" aria-disabled="true">View documentation ↗</a>
  </div>
</aside>
<script>
(() => {
  const nav = document.currentScript.previousElementSibling;
  const layout = nav && nav.closest(".admin-page-layout");
  const toggle = nav && nav.querySelector(".admin-nav-toggle");
  if (!nav || !layout || !toggle) return;

  const storageKey = "bidlens-admin-nav-collapsed";
  const applyState = (collapsed) => {
    nav.classList.toggle("is-collapsed", collapsed);
    layout.classList.toggle("admin-nav-collapsed", collapsed);
    toggle.setAttribute("aria-expanded", String(!collapsed));
    toggle.setAttribute("aria-label", collapsed ? "Expand Administration navigation" : "Collapse Administration navigation");
    toggle.setAttribute("title", collapsed ? "Expand navigation" : "Collapse navigation");
  };

  let collapsed = false;
  try {
    collapsed = window.localStorage.getItem(storageKey) === "true";
  } catch (_error) {}
  applyState(collapsed);

  toggle.addEventListener("click", () => {
    collapsed = !nav.classList.contains("is-collapsed");
    applyState(collapsed);
    try {
      window.localStorage.setItem(storageKey, String(collapsed));
    } catch (_error) {}
  });
})();
</script>
