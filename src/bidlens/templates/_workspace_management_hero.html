{% macro workspace_management_hero(title, description, updated_at=none) -%}
<header class="workspace-management-hero" data-workspace-management-hero>
  <div>
    <h1>{{ title }}</h1>
    <p>{{ description }}</p>
  </div>
  {% if updated_at %}
    <div class="organization-updated"><span>Updated</span><strong>{{ updated_at.strftime('%b %d, %Y') }}</strong></div>
  {% endif %}
</header>
{%- endmacro %}
